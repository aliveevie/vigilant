[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
somnia_testnet = "${SOMNIA_TESTNET_RPC}"
somnia_mainnet = "${SOMNIA_MAINNET_RPC}"
